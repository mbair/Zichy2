<div class="layout-container" [ngClass]="containerClass">
    <app-sidebar></app-sidebar>
    <div class="layout-content-wrapper">
        <app-topbar></app-topbar>
        <app-breadcrumb class="content-breadcrumb" [showPageHint]="true"></app-breadcrumb>
        <div class="layout-content">
            <router-outlet></router-outlet>
        </div>
    </div>
    <p-sidebar
        [(visible)]="layoutService.state.helpSidebarVisible"
        position="right"
        [baseZIndex]="1000"
        styleClass="p-sidebar-md"
        (onHide)="closeHelpSidebar()">
        <ng-template pTemplate="header">
            <div class="flex align-items-center gap-2">
                <i class="pi pi-question-circle text-primary"></i>
                <span class="font-semibold">{{ currentHelpContent.title }}</span>
            </div>
        </ng-template>

        <div class="line-height-3">
            <p class="mt-0 mb-3">{{ currentHelpContent.description }}</p>

            <div class="mb-4" *ngFor="let section of currentHelpContent.sections">
                <h5 class="mt-0 mb-2">{{ section.title }}</h5>
                <ul class="pl-3 m-0">
                    <li class="mb-2" *ngFor="let item of section.items">{{ item }}</li>
                </ul>
            </div>
        </div>
    </p-sidebar>
    <app-profilemenu></app-profilemenu>
    <!-- <app-config></app-config> -->
    <div class="layout-mask"></div>
</div>
<p-dialog
    [visible]="shouldShowSessionWarning"
    header="Közeleg a munkamenet vége"
    [modal]="!hasSessionWarningError"
    [closable]="hasSessionWarningError"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="hasSessionWarningError"
    [style]="{ width: 'min(32rem, calc(100vw - 2rem))' }"
    (onHide)="onSessionWarningHide()">
    <div class="flex gap-3 align-items-start">
        <i class="pi pi-exclamation-triangle text-orange-500 mt-1" style="font-size: 1.75rem"></i>
        <div class="flex-1">
            <p class="m-0 mb-2 line-height-3">
                A munkamenet hamarosan lejár.
                Várható kijelentkeztetés:
                <strong>{{ formatSessionRemaining(sessionWarning.remainingMs) }}</strong>
                múlva.
            </p>
            <p class="m-0 text-600 line-height-3">
                {{ sessionWarningDescription }}
            </p>
            <small *ngIf="sessionWarning.error" class="block mt-3 text-red-500 line-height-3">
                {{ sessionWarning.error }}
            </small>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex flex-column sm:flex-row justify-content-end gap-2">
            <button
                pButton
                pRipple
                type="button"
                label="Kijelentkezés"
                icon="pi pi-times"
                class="p-button-outlined"
                (click)="logout()"></button>
            <button
                pButton
                pRipple
                type="button"
                [icon]="staySignedInIcon"
                [label]="staySignedInLabel"
                [loading]="sessionWarning.refreshing"
                (click)="staySignedIn()"></button>
        </div>
    </ng-template>
</p-dialog>
