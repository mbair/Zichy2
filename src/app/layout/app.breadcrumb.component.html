<nav class="layout-breadcrumb">
    <div class="layout-breadcrumb__content">
        <ol>
            <ng-template ngFor let-item let-last="last" [ngForOf]="breadcrumbs$ | async">
                <li>{{item.label}}</li>
                <li *ngIf="!last" class="layout-breadcrumb-chevron"> / </li>
            </ng-template>
        </ol>

        <div *ngIf="showPageHint && (pageHint$ | async) as pageHint"
             class="layout-breadcrumb__hint">
            <span class="layout-breadcrumb__hint-inner">
                <i class="pi pi-info-circle"></i>
                <span>{{ pageHint }}</span>
            </span>
        </div>
    </div>
</nav>
