<p-fileUpload 
    [name]="name" 
    [accept]="accept"
    [maxFileSize]="maxFileSize ?? undefined"
    [multiple]="false"
    [fileLimit]="1"
    [disabled]="disabled"
    [chooseLabel]="chooseLabel" 
    [cancelLabel]="cancelLabel" 
    [showUploadButton]="false"
    (onSelect)="onFileChange($event)"
    (onRemove)="onFileClear()"
    (onClear)="onFileClear()"
    removeStyleClass="px-3">
</p-fileUpload>
