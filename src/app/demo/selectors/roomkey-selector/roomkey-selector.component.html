<!-- ReactiveForms -->
<p-select *ngIf="getFormControl() as control; else useNgModel"
            [formControl]="control"
            [options]="options"
            optionLabel="label"
            optionValue="value"
            (onChange)="handleOnChange($event)"
            [placeholder]="placeholder"
            emptyMessage="Nincs találat..."
            [showClear]="showClear"
            appendTo="body">
    <ng-template pTemplate="item" let-option>
        <span [ngClass]="'color-badge ' + option?.color">
            <i class="mr-2" [ngClass]="option?.icon"></i>
            {{ option?.label }}
        </span>
    </ng-template>
    <ng-template pTemplate="selectedItem" let-selectedItem>
        <span *ngIf="selectedItem" [ngClass]="'color-badge ' + selectedItem?.color">
            <i class="mr-2" [ngClass]="selectedItem?.icon"></i>
            {{ selectedItem?.label }}
        </span>
    </ng-template>
</p-select>

<!-- ngModel -->
<ng-template #useNgModel>
    <p-select [(ngModel)]="selectedValue"
                [options]="options"
                optionLabel="label"
                optionValue="value"
                (onChange)="handleOnChange($event)"
                [placeholder]="placeholder"
                emptyMessage="Nincs találat..."
                [showClear]="showClear"
                appendTo="body">
        <ng-template pTemplate="item" let-option>
            <span [ngClass]="'color-badge ' + option?.color">
                <i class="mr-2" [ngClass]="option?.icon"></i>
                {{ option?.label }}
            </span>
        </ng-template>
        <ng-template pTemplate="selectedItem" let-selectedItem>
            <span *ngIf="selectedItem" [ngClass]="'color-badge ' + selectedItem?.color">
                <i class="mr-2" [ngClass]="selectedItem?.icon"></i>
                {{ selectedItem?.label }}
            </span>
        </ng-template>
    </p-select>
</ng-template>
