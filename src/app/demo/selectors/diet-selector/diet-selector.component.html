<!-- ReactiveForms -->
<p-select *ngIf="getFormControl() as control; else useNgModel"
            [formControl]="control"
            [options]="diets"
            optionLabel="name"
            optionValue="name"
            (onChange)="handleOnChange($event)"
            placeholder="{{ 'Válasszon...' | translate }}"
            emptyMessage="{{ 'Nincs találat...' | translate }}"
            [showClear]="showClear"
            appendTo="body">

    <ng-template pTemplate="item" let-option>
        <span [ngClass]="'color-badge ' + option?.color">
            {{ option.name | translate }}
        </span>
    </ng-template>
    <ng-template pTemplate="selectedItem" let-selectedItem>
        <span [ngClass]="'color-badge ' + selectedItem?.color">
            {{ selectedItem?.name | translate  }}
        </span>
    </ng-template>
</p-select>

<!-- ngModel -->
<ng-template #useNgModel>
    <p-select [(ngModel)]="selectedDiet"
                [options]="diets"
                optionLabel="name"
                optionValue="name"
                (onChange)="handleOnChange($event)"
                placeholder="{{ 'Válasszon...' | translate }}"
                emptyMessage="{{ 'Nincs találat...' | translate }}"
                [showClear]="showClear"
                appendTo="body">

        <ng-template pTemplate="item" let-option>
            <span [ngClass]="'color-badge ' + option?.color">
                {{ option.name | translate  }}
            </span>
        </ng-template>
        <ng-template pTemplate="selectedItem" let-selectedItem>
            <span [ngClass]="'color-badge ' + selectedItem?.color">
                {{ selectedItem?.name | translate  }}
            </span>
        </ng-template>
    </p-select>
</ng-template>
