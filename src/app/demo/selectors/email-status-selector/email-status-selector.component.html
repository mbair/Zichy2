<p-dropdown *ngIf="getFormControl() as control; else useNgModel"
            [formControl]="control"
            [options]="options"
            optionLabel="label"
            optionValue="value"
            (onChange)="handleOnChange($event)"
            [placeholder]="placeholder"
            emptyMessage="Nincs találat..."
            [showClear]="showClear"
            appendTo="body"
            styleClass="email-status-dropdown">
    <ng-template pTemplate="item" let-option>
        <span [ngClass]="'color-badge email-status-badge ' + option?.color">
            <i [ngClass]="option?.icon"></i>
            {{ option?.label }}
        </span>
    </ng-template>
    <ng-template pTemplate="selectedItem" let-selectedItem>
        <span *ngIf="selectedItem" [ngClass]="'color-badge email-status-badge ' + selectedItem?.color">
            <i [ngClass]="selectedItem?.icon"></i>
            {{ selectedItem?.label }}
        </span>
    </ng-template>
</p-dropdown>

<ng-template #useNgModel>
    <p-dropdown [(ngModel)]="selectedValue"
                [options]="options"
                optionLabel="label"
                optionValue="value"
                (onChange)="handleOnChange($event)"
                [placeholder]="placeholder"
                emptyMessage="Nincs találat..."
                [showClear]="showClear"
                [disabled]="disabled"
                appendTo="body"
                styleClass="email-status-dropdown">
        <ng-template pTemplate="item" let-option>
            <span [ngClass]="'color-badge email-status-badge ' + option?.color">
                <i [ngClass]="option?.icon"></i>
                {{ option?.label }}
            </span>
        </ng-template>
        <ng-template pTemplate="selectedItem" let-selectedItem>
            <span *ngIf="selectedItem" [ngClass]="'color-badge email-status-badge ' + selectedItem?.color">
                <i [ngClass]="selectedItem?.icon"></i>
                {{ selectedItem?.label }}
            </span>
        </ng-template>
    </p-dropdown>
</ng-template>
